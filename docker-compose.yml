services:
  keycloak-db:
    image: postgres:17
    container_name: keyguard-keycloak-db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bao041012
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - keyguard-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keyguard-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: bao041012

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db
    networks:
      - keyguard-network

volumes:
  keycloak_db_data:

networks:
  keyguard-network:
    driver: bridge