spring:
  application:
    name: KeyGuard

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true