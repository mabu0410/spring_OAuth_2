server:
  port: ${SERVER_PORT}

spring:
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE